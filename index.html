<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300"> <title>Dashboard de Ventas - CEDIS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; margin: 20px; }
        .container { width: 90%; margin: auto; }
        canvas { background: #2d2d2d; border-radius: 8px; padding: 15px; }
        h1 { text-align: center; color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avance de Ventas por Ruta</h1>
        <canvas id="ventasChart"></canvas>
    </div>

    <script>
        // PEGA AQUÍ TU LINK DE GOOGLE SHEETS (EL QUE TERMINA EN .csv)
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=1020212716&single=true&output=csv';

        Papa.parse(public_url, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                const labels = data.map(item => item.RUTA);
                const objetivos = data.map(item => parseFloat(item.OBJETIVO_QUINCENA));
                const ventas = data.map(item => parseFloat(item.VENTA_ALCANZADA));

                new Chart(document.getElementById('ventasChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Objetivo Quincena', data: objetivos, backgroundColor: 'rgba(255, 99, 132, 0.5)' },
                            { label: 'Venta Alcanzada', data: ventas, backgroundColor: 'rgba(75, 192, 192, 0.8)' }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true, grid: { color: '#444' } } }
                    }
                });
            }
        });
    </script>
</body>
</html>
