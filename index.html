<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Bullet Chart Gusi - Full Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* Reset total para ocupar toda la pantalla */
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: #000;
            overflow: hidden;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Contenedor que mantiene la proporción 16:9 */
        #main-container {
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            background: #050505;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            text-align: center;
            margin: 0;
            padding: 1.5vh 0;
            font-size: 3.5vh;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid #333;
        }

        #cedis-label { color: #00e676; font-weight: bold; }

        .chart-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            padding: 10px 25px 5px 10px;
        }

        #bulletChart { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="main-container">
        <h1>AVANCE QUINCENAL - <span id="cedis-label">CARGANDO...</span></h1>
        <div class="chart-wrapper">
            <canvas id="bulletChart"></canvas>
        </div>
    </div>

    <script>
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=1020212716&single=true&output=csv';

        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        function cleanNumber(val) {
            if (!val) return 0;
            return parseFloat(val.toString().replace(/[$, ]/g, '')) || 0;
        }

        Papa.parse(public_url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data.filter(row => {
                    const keys = Object.keys(row);
                    const cediKey = keys.find(k => k.trim().toUpperCase() === 'CEDIS');
                    const rutaKey = keys.find(k => k.trim().toUpperCase() === 'RUTA');
                    const match = filtradoCedis ? row[cediKey]?.trim().toUpperCase() === filtradoCedis.toUpperCase() : true;
                    return match && row[rutaKey] && row[rutaKey].trim() !== '';
                });

                document.getElementById('cedis-label').innerText = filtradoCedis?.toUpperCase() || "TODOS";

                const colRuta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'RUTA');
                const colObj = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'OBJETIVO_QUINCENA');
                const colVta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'VENTA_ALCANZADA');
                const colIdeal = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'ALCANCE_IDEAL');

                const ctx = document.getElementById('bulletChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item[colRuta]),
                        datasets: [
                            {
                                label: 'Ideal a la fecha',
                                data: data.map(item => cleanNumber(item[colIdeal])),
                                type: 'scatter',
                                backgroundColor: '#fff',
                                borderColor: '#fff',
                                pointStyle: 'rectRot',
                                pointRadius: 10,
                                order: 0
                            },
                            {
                                label: 'Venta Actual',
                                data: data.map(item => cleanNumber(item[colVta])),
                                backgroundColor: '#00e676',
                                barPercentage: 0.5,
                                categoryPercentage: 0.8,
                                order: 1
                            },
                            {
                                label: 'Objetivo Total',
                                data: data.map(item => cleanNumber(item[colObj])),
                                backgroundColor: 'rgba(255, 255, 255, 0.1)',
                                borderColor: '#ff5252',
                                borderWidth: 2,
                                barPercentage: 0.85,
                                categoryPercentage: 0.8,
                                order: 2
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#fff', font: { size: 16 }, padding: 20 }
                            }
                        },
                        scales: {
                            x: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { 
                                    color: '#aaa',
                                    font: { size: 12 },
                                    callback: v => '$' + v.toLocaleString() 
                                }
                            },
                            y: {
                                grid: { display: false },
                                ticks: { color: '#fff', font: { size: 16, weight: 'bold' } }
                            }
                        },
                        layout: { padding: { right: 20 } }
                    }
                });
            }
        });
    </script>
</body>
</html>
