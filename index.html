<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Dashboard Gusi - Real Bullet Graph</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #fbfcfc;
            --card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #7f8c8d;
            --green: #00b894;
            --red: #ff7675;
            --dark: #2d3436;
            --border: #edf2f1;
            --bullet-bg: #f1f2f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            height: 100vh; width: 100vw; background: var(--bg); 
            overflow: hidden; color: var(--text-main); 
            font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        #wrapper { 
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            background: var(--card); display: flex; flex-direction: column; 
            padding: 3vh; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-radius: 16px;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5vh; padding-bottom: 1.5vh; border-bottom: 1px solid var(--border); }
        h1 { font-size: 2.6vh; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
        #cedis-label { color: var(--green); }

        #main-content { display: flex; flex: 1; gap: 2vw; overflow: hidden; }

        /* Paneles */
        .panel { display: flex; flex-direction: column; overflow: hidden; }
        .left-panel { flex: 0.58; padding-right: 1vw; }
        .right-panel { flex: 0.42; gap: 2vh; }

        .chart-container { flex: 1; position: relative; }

        /* Tabla Minimalista */
        .table-box { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .table-box::-webkit-scrollbar { display: none; }
        
        table { width: 100%; border-collapse: collapse; font-size: 1.35vh; table-layout: fixed; }
        th { position: sticky; top: 0; background: var(--card); text-align: right; padding: 1vh 0.5vw; color: var(--text-sub); font-weight: 600; text-transform: uppercase; font-size: 1.1vh; border-bottom: 1px solid var(--border); z-index: 10; }
        th:first-child { text-align: left; width: 25%; }
        
        td { padding: 0.7vh 0.5vw; text-align: right; border-bottom: 1px solid rgba(241, 242, 246, 0.5); color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        td:first-child { text-align: left; font-weight: 600; color: var(--dark); }

        /* Badge para Diferencia */
        .diff-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 1.1vh; min-width: 60px; text-align: center;}
        .pos { background: rgba(0, 184, 148, 0.08); color: var(--green); }
        .neg { background: rgba(255, 118, 117, 0.08); color: var(--red); }

        .tr-total { background: #fafafa; position: sticky; bottom: 0; z-index: 5; }
        .tr-total td { font-weight: 800; border-top: 1.5px solid var(--dark); border-bottom: none; padding: 1vh 0.5vw; color: var(--dark) !important; font-size: 1.4vh; }

        /* KPI Circular Minimalista */
        .kpi-box { 
            height: 14vh; display: flex; align-items: center; justify-content: center; gap: 2.5vw;
            border: 1px solid var(--border); border-radius: 12px; padding: 1.5vh; background: #fbfcfc;
        }
        .kpi-info { display: flex; flex-direction: column; justify-content: center;}
        .kpi-val { font-size: 3.8vh; font-weight: 800; line-height: 1; color: var(--dark); }
        .kpi-target { font-size: 1.3vh; color: var(--text-sub); font-weight: 400; margin-top: 2px;}
        
        .footer { font-size: 1.2vh; color: #b2bec3; text-align: center; margin-top: 2vh; font-weight: 400; padding-top: 1vh; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            <h1>Monitoreo Quincenal <span id="cedis-label"></span></h1>
            <div id="date-now" style="font-size: 1.3vh; font-weight: 500; color: var(--text-sub);"></div>
        </header>

        <div id="main-content">
            <div class="panel left-panel">
                <div class="chart-container"><canvas id="bulletChart"></canvas></div>
            </div>
            <div class="panel right-panel">
                <div class="table-box">
                    <table id="dataTable">
                        <thead>
                            <tr><th style="text-align: left;">Ruta</th><th>Objetivo</th><th>Venta</th><th>Ideal</th><th>Dif. hoy</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="kpi-box">
                    <div style="height: 100%; width: 90px; position: relative;">
                        <canvas id="kpiChart"></canvas>
                        </div>
                    <div class="kpi-info">
                        <span style="font-size: 1vh; text-transform: uppercase; font-weight: 800; color: var(--text-sub); letter-spacing: 0.5px;">Logro Global CEDIS</span>
                        <div class="kpi-val" id="percent-val">0%</div>
                        <div class="kpi-target" id="target-val">Meta esperada hoy: 0%</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">Source: SistemaCP | Made by Inteligencia Comercial</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=255221202&single=true&output=csv';
        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        // Fecha actual formateada de forma minimalista
        const ahora = new Date();
        document.getElementById('date-now').innerText = ahora.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' }) + ' · ' + ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });

        function clean(v) { return parseFloat(v?.toString().replace(/[$, ]/g, '')) || 0; }
        function fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }
        function fmtD(n) { return (n >= 0 ? '+' : '-') + '$' + Math.abs(Math.round(n)).toLocaleString('en-US'); }

        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                const headers = Object.keys(res.data[0]);
                const cKey = headers.find(k => k.toUpperCase().includes('CEDIS'));
                const rKey = headers.find(k => k.toUpperCase().includes('RUTA'));
                const cObj = headers.find(k => k.toUpperCase().includes('OBJETIVO'));
                const cVta = headers.find(k => k.toUpperCase().includes('VENTA')); 
                const cIdl = headers.find(k => k.toUpperCase().includes('IDEAL'));

                let data = res.data.filter(row => (filtradoCedis ? row[cKey]?.trim().toUpperCase() === filtradoCedis.toUpperCase() : true) && row[rKey]?.trim());
                document.getElementById('cedis-label').innerText = '· ' + (filtradoCedis?.toUpperCase() || "GLOBAL");

                const tbody = document.querySelector('#dataTable tbody');
                let tObj = 0, tVta = 0, tIdl = 0, rowsHTML = '';

                data.forEach(item => {
                    const o = clean(item[cObj]), v = clean(item[cVta]), i = clean(item[cIdl]), d = v - i;
                    tObj += o; tVta += v; tIdl += i;
                    rowsHTML += `<tr><td>${item[rKey]}</td><td>${fmt(o)}</td><td style="color:var(--green);font-weight:700;">${fmt(v)}</td><td>${fmt(i)}</td><td><span class="diff-badge ${d>=0?'pos':'neg'}">${fmtD(d)}</span></td></tr>`;
                });

                const globalLogro = tObj > 0 ? (tVta/tObj)*100 : 0;
                const globalIdeal = tObj > 0 ? (tIdl/tObj)*100 : 0;
                const globalDiff = tVta - tIdl;

                rowsHTML += `<tr class="tr-total"><td>TOTAL CEDIS</td><td>${fmt(tObj)}</td><td>${fmt(tVta)}</td><td>${fmt(tIdl)}</td><td><span class="diff-badge ${globalDiff>=0?'pos':'neg'}">${fmtD(globalDiff)}</span></td></tr>`;
                tbody.innerHTML = rowsHTML;

                document.getElementById('percent-val').innerText = Math.round(globalLogro) + '%';
                document.getElementById('target-val').innerText = 'Meta esperada hoy: ' + Math.round(globalIdeal) + '%';
                if(globalLogro < globalIdeal) document.getElementById('percent-val').style.color = 'var(--red)';

                // Dona KPI Ultra-Minimal (Más delgada)
                new Chart(document.getElementById('kpiChart'), {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [Math.min(globalLogro, globalIdeal), Math.max(0, globalIdeal - globalLogro), Math.max(0, 100 - Math.max(globalLogro, globalIdeal))],
                            backgroundColor: [globalLogro >= globalIdeal ? '#00b894' : '#ff7675', '#34495e', '#f1f2f6'],
                            borderWidth: 0,
                        }]
                    },
                    options: { cutout: '85%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, layout: { padding: 5 } }
                });

                // --- REAL BULLET CHART CONFIGURATION ---
                new Chart(document.getElementById('bulletChart'), {
                    data: {
                        labels: data.map(item => item[rKey]),
                        datasets: [
                            // 1. OBJETIVO QUINCENAL (Fondo Ancho y Claro)
                            { 
                                type: 'bar', 
                                label: 'Objetivo Quincena', 
                                data: data.map(item => clean(item[cObj])), 
                                backgroundColor: '#f1f2f6', // Gris claro de fondo
                                borderWidth: 0,
                                barPercentage: 0.85, // Ancho, ocupa casi todo el espacio de la fila
                                categoryPercentage: 1.0,
                                order: 3 // Va al fondo
                            },
                            // 2. VENTA ALCANZADA (Barra Delgada Superpuesta)
                            { 
                                type: 'bar', 
                                label: 'Venta Actual', 
                                data: data.map(item => clean(item[cVta])), 
                                backgroundColor: '#00b894', // Verde vibrante
                                borderWidth: 0,
                                barPercentage: 0.5, // Delgada, centrada dentro del objetivo
                                categoryPercentage: 1.0,
                                order: 2 // Se dibuja sobre el objetivo
                            },
                            // 3. ALCANCE IDEAL HOY (Marcador de Línea Vertical)
                            { 
                                type: 'line', 
                                label: 'Debería llevar hoy', 
                                data: data.map(item => clean(item[cIdl])), 
                                backgroundColor: '#2d3436', // Negro/Gris oscuro
                                borderColor: '#2d3436', 
                                showLine: false, // No unir los puntos con líneas
                                pointStyle: 'line', // Usar estilo de línea vertical
                                rotation: 90, // Rotar el punto para que sea vertical
                                pointRadius: 16, // Altura del marcador (debe cruzar ambas barras)
                                pointBorderWidth: 4, // Grosor del marcador
                                order: 1 // Se dibuja hasta arriba
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y', // Gráfica horizontal
                        responsive: true, 
                        maintainAspectRatio: false, 
                        grouped: false, // CLAVE: No agrupar barras, dibujarlas encimadas
                        animation: { duration: 500 }, // Animación sutil
                        plugins: { 
                            legend: { display: false }, // Sin leyendas, diseño limpio
                            tooltip: {
                                backgroundColor: 'rgba(45, 52, 54, 0.9)',
                                titleFont: { size: 14, weight: 600 },
                                bodyFont: { size: 13 },
                                padding: 10,
                                cornerRadius: 6,
                                callbacks: {
                                    label: (ctx) => `${ctx.dataset.label}: ${fmt(ctx.parsed.x)}`
                                }
                            }
                        },
                        scales: {
                            x: { 
                                grid: { display: false }, // Sin líneas de cuadrícula verticales
                                border: { display: false },
                                ticks: { 
                                    font: { size: 10, weight: 400 }, 
                                    color: '#b2bec3',
                                    callback: v => '$' + v.toLocaleString('en-US', { notation: 'compact' }) // Formato compacto $10K
                                } 
                            },
                            y: { 
                                grid: { display: false }, // Sin líneas de cuadrícula horizontales
                                border: { display: false },
                                ticks: { 
                                    font: { weight: 600, size: 13 }, 
                                    color: '#2d3436',
                                    padding: 10
                                } 
                            }
                        },
                        layout: { padding: { left: 5, right: 15, top: 10, bottom: 10 } }
                    }
                });
            }
        });
    </script>
</body>
</html>
