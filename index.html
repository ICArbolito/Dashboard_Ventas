<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Bullet Graph Gusi Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100vh; width: 100vw; background: #000; overflow: hidden; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        #wrapper { width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; background: #080808; display: flex; flex-direction: column; }
        h1 { text-align: center; padding: 1.5vh; font-size: 3vh; border-bottom: 1px solid #333; text-transform: uppercase; }
        .chart-box { flex: 1; position: relative; padding: 10px 40px 10px 10px; }
        #bulletChart { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="wrapper">
        <h1>Avance Quincenal - <span id="cedis-label" style="color:#00e676">...</span></h1>
        <div class="chart-box">
            <canvas id="bulletChart"></canvas>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=1020212716&single=true&output=csv';
        const urlParams = new URLSearchParams(window.location.search);
        const cedis = urlParams.get('cedis');

        function num(v) { return parseFloat(v?.toString().replace(/[$, ]/g, '')) || 0; }

        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                let data = res.data.filter(r => {
                    const cKey = Object.keys(r).find(k => k.trim().toUpperCase() === 'CEDIS');
                    return cedis ? r[cKey]?.trim().toUpperCase() === cedis.toUpperCase() : true;
                });

                document.getElementById('cedis-label').innerText = cedis?.toUpperCase() || "TODOS";

                const labels = data.map(d => d[Object.keys(d).find(k => k.trim().toUpperCase() === 'RUTA')]);
                const vta = data.map(d => num(d[Object.keys(d).find(k => k.trim().toUpperCase() === 'VENTA_ALCANZADA')]));
                const obj = data.map(d => num(d[Object.keys(d).find(k => k.trim().toUpperCase() === 'OBJETIVO_QUINCENA')]));
                const idl = data.map(d => num(d[Object.keys(d).find(k => k.trim().toUpperCase() === 'ALCANCE_IDEAL')]));

                new Chart(document.getElementById('bulletChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Ideal',
                                data: idl,
                                type: 'scatter',
                                backgroundColor: '#fff',
                                pointStyle: 'line', // Línea vertical
                                rotation: 90,
                                pointRadius: 15,
                                borderWidth: 3,
                                borderColor: '#fff',
                                order: 0
                            },
                            {
                                label: 'Venta Actual',
                                data: vta,
                                backgroundColor: '#00e676',
                                barPercentage: 0.4, // Delgada
                                categoryPercentage: 1,
                                order: 1
                            },
                            {
                                label: 'Objetivo Total',
                                data: obj,
                                backgroundColor: 'rgba(255, 82, 82, 0.1)',
                                borderColor: '#ff5252',
                                borderWidth: 1,
                                barPercentage: 0.8, // Gruesa (contenedor)
                                categoryPercentage: 1,
                                order: 2
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        // ESTA ES LA CLAVE PARA QUE SE ENCIMEN
                        datasets: {
                            bar: {
                                grouping: false 
                            }
                        },
                        scales: {
                            x: { 
                                stacked: false, 
                                beginAtZero: true, 
                                grid: { color: '#222' },
                                ticks: { color: '#888', callback: v => '$' + v.toLocaleString() }
                            },
                            y: { 
                                stacked: false,
                                ticks: { color: '#fff', font: { weight: 'bold', size: 14 } }
                            }
                        },
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#fff' } }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
