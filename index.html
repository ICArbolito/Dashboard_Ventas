<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Dashboard Pro Gusi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; color: white; margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }
        .wrapper {
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh;
            background: #0a0a0a; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; border-radius: 10px;
        }
        h1 { text-align: center; margin: 0 0 10px 0; font-size: 2.8vw; text-transform: uppercase; }
        #cedis-label { color: #00e676; }
        .chart-container { flex-grow: 1; position: relative; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>AVANCE QUINCENAL - <span id="cedis-label">CARGANDO...</span></h1>
        <div class="chart-container">
            <canvas id="bulletChart"></canvas>
        </div>
    </div>

    <script>
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=1020212716&single=true&output=csv';
        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        function cleanNumber(val) {
            if (!val) return 0;
            return parseFloat(val.toString().replace(/[$, ]/g, '')) || 0;
        }

        Papa.parse(public_url, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                let data = results.data.filter(row => {
                    const cediKey = Object.keys(row).find(k => k.trim().toUpperCase() === 'CEDIS');
                    return filtradoCedis ? row[cediKey]?.trim().toUpperCase() === filtradoCedis.toUpperCase() : true;
                });

                document.getElementById('cedis-label').innerText = filtradoCedis?.toUpperCase() || "TODOS";

                const colRuta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'RUTA');
                const colObj = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'OBJETIVO_QUINCENA');
                const colVta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'VENTA_ALCANZADA');
                const colIdeal = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'ALCANCE_IDEAL');

                new Chart(document.getElementById('bulletChart'), {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item[colRuta]),
                        datasets: [
                            {
                                label: 'Venta Actual',
                                data: data.map(item => cleanNumber(item[colVta])),
                                backgroundColor: '#00e676',
                                barPercentage: 0.4, // Más delgada para que parezca el centro del bullet
                                order: 1
                            },
                            {
                                label: 'Ideal a la fecha',
                                data: data.map(item => cleanNumber(item[colIdeal])),
                                type: 'scatter', // Usamos puntos para simular el marcador de "donde debería ir"
                                backgroundColor: '#fff',
                                borderColor: '#fff',
                                pointStyle: 'rectRot',
                                pointRadius: 8,
                                order: 0
                            },
                            {
                                label: 'Objetivo Total',
                                data: data.map(item => cleanNumber(item[colObj])),
                                backgroundColor: 'rgba(255, 255, 255, 0.1)',
                                borderColor: '#ff5252',
                                borderWidth: 1,
                                barPercentage: 0.8, // Más ancha, sirve de "contenedor"
                                order: 2
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#fff', font: { size: 14 } } }
                        },
                        scales: {
                            x: { 
                                stacked: false, // Importante: False para que se encimen manualmente con el orden
                                grid: { color: '#333' },
                                ticks: { color: '#aaa', callback: (v) => '$' + v.toLocaleString() }
                            },
                            y: { 
                                grid: { display: false },
                                ticks: { color: '#fff', font: { size: 14, weight: 'bold' } }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
