<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Bullet Chart Horizontal 16:9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* Forzamos el aspecto 16:9 negro */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Contenedor principal 16:9 */
        .wrapper {
            width: 100vw;
            height: 56.25vw; /* 100 * (9/16) para forzar 16:9 */
            max-height: 100vh;
            max-width: 177.78vh; /* 100 * (16/9) para forzar 16:9 */
            background: #111; 
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,255,118,0.2);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 { 
            text-align: center; 
            margin: 0 0 15px 0; 
            font-size: 3vw; /* Escala con la pantalla */
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #cedis-label { 
            color: #00e676; 
            font-weight: bold; 
            text-shadow: 0 0 10px rgba(0,230,118,0.5);
        }
        
        .chart-container {
            flex-grow: 1; /* Ocupa el resto del espacio */
            position: relative;
            width: 100%;
            height: 100%;
        }

        #status { 
            color: #ff5252; 
            font-size: 1.5vw; 
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>AVANCE DE VENTAS - <span id="cedis-label">CARGANDO...</span></h1>
        <div id="status">Conectando...</div>
        <div class="chart-container">
            <canvas id="bulletChart"></canvas>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=1020212716&single=true&output=csv'; // <--- TU LINK AQUÍ
        // ---------------------

        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        function cleanNumber(val) {
            if (!val) return 0;
            return parseFloat(val.toString().replace(/[$, ]/g, '')) || 0;
        }

        Papa.parse(public_url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            error: function(err) {
                document.getElementById('status').innerText = "ERROR: No se pudo conectar con Google Sheets.";
            },
            complete: function(results) {
                const data = results.data.filter(row => {
                    const keys = Object.keys(row);
                    const cediKey = keys.find(k => k.trim().toUpperCase() === 'CEDIS');
                    return row[cediKey] && row[cediKey].trim().toUpperCase() === filtradoCedis.toUpperCase();
                });

                document.getElementById('cedis-label').innerText = filtradoCedis.toUpperCase();

                if (data.length === 0) {
                    document.getElementById('status').innerText = "ERROR: No hay datos para: " + filtradoCedis;
                    return;
                }

                document.getElementById('status').style.display = 'none';

                const colRuta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'RUTA');
                const colObj = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'OBJETIVO_QUINCENA');
                const colVta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'VENTA_ALCANZADA');

                new Chart(document.getElementById('bulletChart'), {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item[colRuta]),
                        datasets: [
                            {
                                label: 'Venta',
                                data: data.map(item => cleanNumber(item[colVta])),
                                backgroundColor: '#00e676',
                                order: 1,
                                barPercentage: 0.6, // Un poco más gruesa la venta
                                categoryPercentage: 0.8
                            },
                            {
                                label: 'Objetivo',
                                data: data.map(item => cleanNumber(item[colObj])),
                                backgroundColor: 'rgba(255, 82, 82, 0.15)',
                                borderColor: '#ff5252',
                                borderWidth: 2,
                                order: 2,
                                barPercentage: 0.95, // Casi todo el ancho para el objetivo
                                categoryPercentage: 0.8
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y', // <--- LA MAGIA: Gráfica horizontal
                        responsive: true,
                        maintainAspectRatio: false, // Dejamos que el CSS wrapper mande
                        plugins: { 
                            legend: { 
                                position: 'bottom', // Leyenda abajo para ganar espacio
                                labels: { color: '#fff', font: { size: 14 } } 
                            },
                            tooltip: { enabled: true }
                        },
                        scales: {
                            x: { // Ahora el eje X es el de los números
                                beginAtZero: true, 
                                grid: { color: '#333' }, 
                                ticks: { 
                                    color: '#aaa', 
                                    font: { size: 12 },
                                    callback: (value) => '$' + value.toLocaleString()
                                } 
                            },
                            y: { // Ahora el eje Y es el de las rutas
                                grid: { display: false }, // Quitamos líneas para limpiar
                                ticks: { 
                                    color: '#fff', 
                                    font: { size: 14, weight: 'bold' } 
                                } 
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
