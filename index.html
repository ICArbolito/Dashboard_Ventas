<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Gusi Intelligence - Modern UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --green: #10b981;
            --red: #f43f5e;
            --blue: #3b82f6;
            --accent: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            height: 100vh; width: 100vw; background: var(--bg); 
            color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; align-items: center; justify-content: center;
        }

        #wrapper { 
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            background: var(--card); display: flex; flex-direction: column; 
            padding: 3vh 5vw; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2vh; }
        h1 { font-size: 3vh; font-weight: 800; letter-spacing: -1px; }
        #cedis-label { color: var(--green); }

        #main-content { display: flex; flex: 1; gap: 4vw; overflow: hidden; }

        /* Panel Izquierdo: Gráfica de Bala */
        .left-panel { flex: 0.55; display: flex; flex-direction: column; }
        .chart-container { flex: 1; background: var(--accent); border-radius: 16px; padding: 1.5vh; }

        /* Panel Derecho: Tabla y KPI */
        .right-panel { flex: 0.45; display: flex; flex-direction: column; gap: 2vh; }
        
        .table-box { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .table-box::-webkit-scrollbar { display: none; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 1.25vh; }
        th { text-align: right; padding: 0 10px 5px 10px; color: var(--text-sub); font-size: 1vh; text-transform: uppercase; font-weight: 700; }
        th:first-child { text-align: left; }
        
        /* Efecto de Tarjetas en la Tabla */
        td { padding: 1vh 10px; background: var(--accent); border: none; }
        td:first-child { border-radius: 10px 0 0 10px; font-weight: 700; text-align: left; }
        td:last-child { border-radius: 0 10px 10px 0; }

        /* Badge de Diferencia con estilo Neumórfico */
        .diff-badge { padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 1.1vh; display: inline-block; min-width: 65px; text-align: center;}
        .pos { background: #dcfce7; color: #166534; }
        .neg { background: #fee2e2; color: #991b1b; }

        .tr-total td { background: var(--text-main) !important; color: white !important; font-size: 1.4vh; padding: 1.2vh 10px; }

        /* KPI Box con diseño de Dashboard Moderno */
        .kpi-box { 
            height: 14vh; display: flex; align-items: center; justify-content: center; gap: 2vw;
            background: var(--text-main); color: white; border-radius: 16px; padding: 2vh;
        }
        .kpi-val { font-size: 5vh; font-weight: 800; line-height: 1; letter-spacing: -2px; }
        .kpi-target { font-size: 1.4vh; opacity: 0.7; }
        
        .footer { font-size: 1.2vh; color: var(--text-sub); text-align: center; margin-top: 2vh; }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            <h1>Rendimiento <span id="cedis-label"></span></h1>
            <div id="days-info" style="font-weight: 700; font-size: 1.4vh; color: var(--blue);"></div>
        </header>

        <div id="main-content">
            <div class="panel left-panel">
                <div class="chart-container"><canvas id="bulletChart"></canvas></div>
            </div>
            <div class="panel right-panel">
                <div class="table-box">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th style="text-align: left;">Ruta</th>
                                <th>Objetivo</th>
                                <th>Venta</th>
                                <th>Ideal</th>
                                <th>Dif.</th>
                                <th style="color:var(--blue)">Cuota L-S</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="kpi-box">
                    <div style="height: 100%; width: 100px;"><canvas id="kpiChart"></canvas></div>
                    <div class="kpi-info" style="display:flex; flex-direction:column;">
                        <span style="font-size: 1vh; text-transform: uppercase; opacity: 0.6; font-weight: 700;">Avance Global</span>
                        <div class="kpi-val" id="percent-val">0%</div>
                        <div class="kpi-target" id="target-val">Meta: 0%</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">ARBOLITO © 2026 · SISTEMACP DATA FLOW</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=255221202&single=true&output=csv';
        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        function getWorkingDays() {
            const now = new Date();
            const day = now.getDate();
            const last = (day <= 15) ? 15 : new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            let count = 0;
            for (let i = day; i <= last; i++) {
                if (new Date(now.getFullYear(), now.getMonth(), i).getDay() !== 0) count++;
            }
            return Math.max(1, count); 
        }

        const daysLeft = getWorkingDays();
        document.getElementById('days-info').innerText = `CIERRE EN ${daysLeft} DÍAS HÁBILES`;

        function clean(v) { return parseFloat(v?.toString().replace(/[$, ]/g, '')) || 0; }
        function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
        function fmtD(n) { return (n >= 0 ? '+' : '-') + '$' + Math.abs(Math.round(n)).toLocaleString(); }

        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                const headers = Object.keys(res.data[0]);
                const cKey = headers.find(k => k.toUpperCase().includes('CEDIS'));
                const rKey = headers.find(k => k.toUpperCase().includes('RUTA'));
                const cObj = headers.find(k => k.toUpperCase().includes('OBJETIVO'));
                const cVta = headers.find(k => k.toUpperCase().includes('VENTA')); 
                const cIdl = headers.find(k => k.toUpperCase().includes('IDEAL'));

                let data = res.data.filter(row => (filtradoCedis ? row[cKey]?.trim().toUpperCase() === filtradoCedis.toUpperCase() : true) && row[rKey]?.trim());
                document.getElementById('cedis-label').innerText = '· ' + (filtradoCedis?.toUpperCase() || "GLOBAL");

                const tbody = document.querySelector('#dataTable tbody');
                let tObj = 0, tVta = 0, tIdl = 0, rowsHTML = '';

                data.forEach(item => {
                    const o = clean(item[cObj]), v = clean(item[cVta]), i = clean(item[cIdl]), d = v - i;
                    tObj += o; tVta += v; tIdl += i;
                    rowsHTML += `<tr><td>${item[rKey]}</td><td>${fmt(o)}</td><td style="color:var(--green);font-weight:800;">${fmt(v)}</td><td>${fmt(i)}</td><td><span class="diff-badge ${d>=0?'pos':'neg'}">${fmtD(d)}</span></td><td style="font-weight:700;color:var(--blue)">${fmt(Math.max(0,(o-v)/daysLeft))}</td></tr>`;
                });

                const pLogro = tObj > 0 ? (tVta/tObj)*100 : 0;
                const pIdeal = tObj > 0 ? (tIdl/tObj)*100 : 0;

                rowsHTML += `<tr class="tr-total"><td>TOTAL</td><td>${fmt(tObj)}</td><td>${fmt(tVta)}</td><td>${fmt(tIdl)}</td><td><span class="diff-badge" style="background:rgba(255,255,255,0.2);color:white">${fmtD(tVta-tIdl)}</span></td><td>${fmt(Math.max(0,(tObj-tVta)/daysLeft))}</td></tr>`;
                tbody.innerHTML = rowsHTML;

                document.getElementById('percent-val').innerText = Math.round(pLogro) + '%';
                document.getElementById('target-val').innerText = 'Ideal hoy: ' + Math.round(pIdeal) + '%';

                new Chart(document.getElementById('kpiChart'), {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [Math.min(pLogro, pIdeal), Math.max(0, pIdeal - pLogro), Math.max(0, 100 - Math.max(pLogro, pIdeal))],
                            backgroundColor: [pLogro >= pIdeal ? '#10b981' : '#f43f5e', '#ffffff', 'rgba(255,255,255,0.1)'],
                            borderWidth: 0,
                        }]
                    },
                    options: { cutout: '80%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });

                new Chart(document.getElementById('bulletChart'), {
                    data: {
                        labels: data.map(item => item[rKey]),
                        datasets: [
                            { type: 'bar', data: data.map(item => clean(item[cObj])), backgroundColor: 'rgba(0,0,0,0.05)', barPercentage: 0.8, borderRadius: 6, order: 3 },
                            { type: 'bar', data: data.map(item => clean(item[cVta])), backgroundColor: '#10b981', barPercentage: 0.4, borderRadius: 6, order: 2 },
                            { type: 'line', data: data.map(item => clean(item[cIdl])), backgroundColor: '#0f172a', borderColor: '#0f172a', showLine: false, pointStyle: 'line', rotation: 90, pointRadius: 12, pointBorderWidth: 4, order: 1 }
                        ]
                    },
                    options: {
                        indexAxis: 'y', responsive: true, maintainAspectRatio: false, grouped: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, callback: v => '$' + v.toLocaleString('en-US', { notation: 'compact' }) } },
                            y: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: 700, size: 13 } } }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
