<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Dashboard Ventas Gusi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .container { width: 95%; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00e676; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avance de Ventas por Ruta</h1>
        <canvas id="ventasChart" height="100"></canvas>
    </div>

    <script>
        // PEGA TU LINK AQUÍ ABAJO
        const public_url = 'TU_LINK_AQUI_EL_QUE_TERMINA_EN_CSV';

        function cleanNumber(val) {
            if (!val) return 0;
            // Quita signos de pesos, comas y espacios para que Chart.js no se apendeje
            return parseFloat(val.replace(/[$, ]/g, '')) || 0;
        }

        Papa.parse(public_url, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data.filter(row => row.RUTA); // Filtra filas vacías
                
                const labels = data.map(item => item.RUTA);
                const objetivos = data.map(item => cleanNumber(item.OBJETIVO_QUINCENA));
                const ventas = data.map(item => cleanNumber(item.VENTA_ALCANZADA));

                new Chart(document.getElementById('ventasChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { 
                                label: 'Objetivo Quincena', 
                                data: objetivos, 
                                backgroundColor: '#ff5252',
                                borderRadius: 5
                            },
                            { 
                                label: 'Venta Alcanzada', 
                                data: ventas, 
                                backgroundColor: '#00e676',
                                borderRadius: 5
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { labels: { color: 'white', font: { size: 14 } } }
                        },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                grid: { color: '#333' },
                                ticks: { color: '#aaa', callback: function(value) { return '$' + value.toLocaleString(); } }
                            },
                            x: { 
                                ticks: { color: '#aaa', autoSkip: false, maxRotation: 90, minRotation: 45 } 
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
