<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Dashboard Gusi - Bullet Real</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100vh; width: 100vw; background: #000; overflow: hidden; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        #wrapper { width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; background: #080808; display: flex; flex-direction: column; }
        h1 { text-align: center; padding: 1.5vh; font-size: 3.5vh; border-bottom: 1px solid #222; text-transform: uppercase; color: #fff; }
        #cedis-label { color: #00e676; }
        .chart-box { flex: 1; position: relative; padding: 15px 30px 5px 10px; }
        #bulletChart { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="wrapper">
        <h1>AVANCE QUINCENAL - <span id="cedis-label">CARGANDO...</span></h1>
        <div class="chart-box">
            <canvas id="bulletChart"></canvas>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=1020212716&single=true&output=csv';
        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        function cleanNumber(val) { return parseFloat(val?.toString().replace(/[$, ]/g, '')) || 0; }

        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                let data = res.data.filter(row => {
                    const cKey = Object.keys(row).find(k => k.trim().toUpperCase() === 'CEDIS');
                    const rKey = Object.keys(row).find(k => k.trim().toUpperCase() === 'RUTA');
                    return (filtradoCedis ? row[cKey]?.trim().toUpperCase() === filtradoCedis.toUpperCase() : true) && row[rKey]?.trim();
                });

                document.getElementById('cedis-label').innerText = filtradoCedis?.toUpperCase() || "TODOS";

                if (!data.length) return;

                const cRuta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'RUTA');
                const cObj = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'OBJETIVO_QUINCENA');
                const cVta = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'VENTA_ALCANZADA');
                const cIdl = Object.keys(data[0]).find(k => k.trim().toUpperCase() === 'ALCANCE_IDEAL');

                new Chart(document.getElementById('bulletChart'), {
                    data: {
                        labels: data.map(item => item[cRuta]),
                        datasets: [
                            {
                                type: 'scatter',
                                label: 'Ideal a la fecha',
                                data: data.map(item => cleanNumber(item[cIdl])),
                                backgroundColor: '#fff',
                                pointStyle: 'rect', // Cambiado a una barra blanca recta
                                rotation: 90, // Girada para que sea vertical
                                pointRadius: 10,
                                order: 0
                            },
                            {
                                type: 'bar',
                                label: 'Venta Actual',
                                data: data.map(item => cleanNumber(item[cVta])),
                                backgroundColor: '#00e676',
                                barPercentage: 0.35, // Delgada
                                categoryPercentage: 0.9,
                                grouped: false, // LA VERDADERA MAGIA: Quita el agrupamiento aquí
                                order: 1
                            },
                            {
                                type: 'bar',
                                label: 'Objetivo Total',
                                data: data.map(item => cleanNumber(item[cObj])),
                                backgroundColor: 'rgba(255, 82, 82, 0.1)',
                                borderColor: '#ff5252',
                                borderWidth: 2,
                                barPercentage: 0.85, // Gruesa (Contenedor)
                                categoryPercentage: 0.9,
                                grouped: false, // Y AQUÍ TAMBIÉN
                                order: 2
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#fff', font: { size: 14 } } }
                        },
                        scales: {
                            x: {
                                stacked: false, // Que los valores no se sumen
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#aaa', callback: v => '$' + v.toLocaleString() }
                            },
                            y: {
                                stacked: true, // FORZA A QUE COMPARTAN LA MISMA LÍNEA HORIZONTAL EXACTA
                                grid: { display: false },
                                ticks: { color: '#fff', font: { weight: 'bold', size: 14 } }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
