<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Dashboard Gusi - Ultra Minimalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --green: #00b894;
            --red: #ff7675;
            --dark: #2d3436;
            --border: #f1f2f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            height: 100vh; width: 100vw; background: var(--bg); 
            overflow: hidden; color: var(--text-main); 
            font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        #wrapper { 
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            background: var(--card); display: flex; flex-direction: column; 
            padding: 3vh; position: relative;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2vh; }
        h1 { font-size: 2.8vh; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        #cedis-label { color: var(--green); }

        #main-content { display: flex; flex: 1; gap: 2.5vw; overflow: hidden; }

        /* Paneles */
        .panel { background: var(--card); border-radius: 12px; display: flex; flex-direction: column; }
        .left-panel { flex: 0.58; }
        .right-panel { flex: 0.42; gap: 2vh; }

        .chart-container { flex: 1; position: relative; }

        /* Tabla Minimalista */
        .table-box { flex: 1; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 1.4vh; }
        th { text-align: right; padding: 1vh 0.5vw; color: var(--text-sub); font-weight: 600; text-transform: uppercase; font-size: 1.1vh; border-bottom: 1px solid var(--border); }
        th:first-child { text-align: left; }
        td { padding: 0.8vh 0.5vw; text-align: right; border-bottom: 1px solid var(--border); color: var(--text-main); }
        td:first-child { text-align: left; font-weight: 600; color: var(--dark); }

        /* Badge para Diferencia */
        .diff-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-size: 1.2vh; }
        .pos { background: rgba(0, 184, 148, 0.1); color: var(--green); }
        .neg { background: rgba(255, 118, 117, 0.1); color: var(--red); }

        .tr-total { background: #fafafa; }
        .tr-total td { font-weight: 800; border-top: 2px solid var(--dark); padding: 1.2vh 0.5vw; }

        /* KPI Circular Minimalista */
        .kpi-box { 
            height: 15vh; display: flex; align-items: center; justify-content: center; gap: 3vw;
            border: 1px solid var(--border); border-radius: 16px; padding: 1.5vh;
        }
        .kpi-info { display: flex; flex-direction: column; }
        .kpi-val { font-size: 4vh; font-weight: 800; line-height: 1; }
        .kpi-target { font-size: 1.4vh; color: var(--text-sub); font-weight: 400; }
        
        .footer { font-size: 1.2vh; color: #b2bec3; text-align: center; margin-top: 2vh; font-weight: 400; }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            <h1>Avance Quincenal <span id="cedis-label"></span></h1>
            <div id="date-now" style="font-size: 1.4vh; font-weight: 600; color: #b2bec3;"></div>
        </header>

        <div id="main-content">
            <div class="panel left-panel">
                <div class="chart-container"><canvas id="bulletChart"></canvas></div>
            </div>
            <div class="panel right-panel">
                <div class="table-box">
                    <table id="dataTable">
                        <thead>
                            <tr><th style="text-align: left;">Ruta</th><th>Objetivo</th><th>Venta</th><th>Ideal</th><th>Dif.</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="kpi-box">
                    <div style="height: 100%; width: 100px;"><canvas id="kpiChart"></canvas></div>
                    <div class="kpi-info">
                        <span style="font-size: 1vh; text-transform: uppercase; font-weight: 800; color: var(--text-sub);">Logro Global</span>
                        <div class="kpi-val" id="percent-val">0%</div>
                        <div class="kpi-target" id="target-val">Meta hoy: 0%</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">Source: SistemaCP | Made by Inteligencia Comercial</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRd-mUGTkbL5f931RSST3DmkXazVg7SjfMNGuhJEi7WtSAo9kf1w681N85BETt3Y3RpaId5RJBbjD-J/pub?gid=255221202&single=true&output=csv';
        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis');

        document.getElementById('date-now').innerText = new Date().toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function clean(v) { return parseFloat(v?.toString().replace(/[$, ]/g, '')) || 0; }
        function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
        function fmtD(n) { return (n > 0 ? '+' : '') + '$' + Math.abs(Math.round(n)).toLocaleString(); }

        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                const headers = Object.keys(res.data[0]);
                const cKey = headers.find(k => k.toUpperCase().includes('CEDIS'));
                const rKey = headers.find(k => k.toUpperCase().includes('RUTA'));
                const cObj = headers.find(k => k.toUpperCase().includes('OBJETIVO'));
                const cVta = headers.find(k => k.toUpperCase().includes('VENTA')); 
                const cIdl = headers.find(k => k.toUpperCase().includes('IDEAL'));

                let data = res.data.filter(row => (filtradoCedis ? row[cKey]?.trim().toUpperCase() === filtradoCedis.toUpperCase() : true) && row[rKey]?.trim());
                document.getElementById('cedis-label').innerText = '· ' + (filtradoCedis?.toUpperCase() || "TODOS");

                const tbody = document.querySelector('#dataTable tbody');
                let tObj = 0, tVta = 0, tIdl = 0, rowsHTML = '';

                data.forEach(item => {
                    const o = clean(item[cObj]), v = clean(item[cVta]), i = clean(item[cIdl]), d = v - i;
                    tObj += o; tVta += v; tIdl += i;
                    rowsHTML += `<tr><td>${item[rKey]}</td><td>${fmt(o)}</td><td style="color:var(--green);font-weight:800;">${fmt(v)}</td><td>${fmt(i)}</td><td><span class="diff-badge ${d>=0?'pos':'neg'}">${fmtD(d)}</span></td></tr>`;
                });

                const globalLogro = tObj > 0 ? (tVta/tObj)*100 : 0;
                const globalIdeal = tObj > 0 ? (tIdl/tObj)*100 : 0;

                rowsHTML += `<tr class="tr-total"><td>TOTAL</td><td>${fmt(tObj)}</td><td>${fmt(tVta)}</td><td>${fmt(tIdl)}</td><td><span class="diff-badge ${tVta-tIdl>=0?'pos':'neg'}">${fmtD(tVta-tIdl)}</span></td></tr>`;
                tbody.innerHTML = rowsHTML;

                document.getElementById('percent-val').innerText = Math.round(globalLogro) + '%';
                document.getElementById('target-val').innerText = 'Meta hoy: ' + Math.round(globalIdeal) + '%';
                if(globalLogro < globalIdeal) document.getElementById('percent-val').style.color = 'var(--red)';

                // Dona KPI Minimal
                new Chart(document.getElementById('kpiChart'), {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [Math.min(globalLogro, globalIdeal), Math.max(0, globalIdeal - globalLogro), Math.max(0, 100 - Math.max(globalLogro, globalIdeal))],
                            backgroundColor: [globalLogro >= globalIdeal ? '#00b894' : '#ff7675', '#2d3436', '#f1f2f6'],
                            borderWidth: 0,
                        }]
                    },
                    options: { cutout: '82%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
                });

                // Bullet Chart Minimal
                new Chart(document.getElementById('bulletChart'), {
                    data: {
                        labels: data.map(item => item[rKey]),
                        datasets: [
                            { type: 'bar', label: 'Objetivo', data: data.map(item => clean(item[cObj])), backgroundColor: '#f1f2f6', barPercentage: 0.8, order: 3 },
                            { type: 'bar', label: 'Venta', data: data.map(item => clean(item[cVta])), backgroundColor: '#00b894', barPercentage: 0.4, order: 2 },
                            { type: 'line', label: 'Ideal', data: data.map(item => clean(item[cIdl])), backgroundColor: '#2d3436', borderColor: '#2d3436', showLine: false, pointStyle: 'rect', rotation: 90, pointRadius: 12, order: 1 }
                        ]
                    },
                    options: {
                        indexAxis: 'y', responsive: true, maintainAspectRatio: false, grouped: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, callback: v => '$' + v.toLocaleString() } },
                            y: { grid: { display: false }, ticks: { font: { weight: 600, size: 13 } } }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
