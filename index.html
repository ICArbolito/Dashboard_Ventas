<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Bullet Chart por CEDIS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; padding: 10px; overflow: hidden; }
        .container { width: 98vw; height: 95vh; margin: auto; background: #111; padding: 15px; border-radius: 10px; }
        h1 { text-align: center; color: #fff; font-size: 28px; margin-bottom: 5px; text-transform: uppercase; }
        #cedis-label { color: #00e676; font-size: 32px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avance de Ventas - <span id="cedis-label">TODOS</span></h1>
        <canvas id="bulletChart"></canvas>
    </div>

    <script>
        // 1. TU LINK DE SIEMPRE
        const public_url = 'TU_LINK_AQUI_EL_QUE_TERMINA_EN_CSV';

        // 2. DETECTAR QUÉ CEDIS QUEREMOS (Sacado de la URL)
        const urlParams = new URLSearchParams(window.location.search);
        const filtradoCedis = urlParams.get('cedis'); // Busca "?cedis=AR"

        function cleanNumber(val) {
            if (!val) return 0;
            return parseFloat(val.toString().replace(/[$, ]/g, '')) || 0;
        }

        Papa.parse(public_url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data.filter(row => row.RUTA && row.RUTA !== 'RUTA');

                // 3. FILTRAR POR CEDIS SI EXISTE EL PARÁMETRO
                if (filtradoCedis) {
                    data = data.filter(row => row.CEDIS && row.CEDIS.trim().toUpperCase() === filtradoCedis.toUpperCase());
                    document.getElementById('cedis-label').innerText = filtradoCedis.toUpperCase();
                }

                const labels = data.map(item => item.RUTA);
                const objetivos = data.map(item => cleanNumber(item.OBJETIVO_QUINCENA));
                const ventas = data.map(item => cleanNumber(item.VENTA_ALCANZADA));

                new Chart(document.getElementById('bulletChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Venta Alcanzada',
                                data: ventas,
                                backgroundColor: '#00e676',
                                order: 1,
                                barPercentage: 0.5,
                                categoryPercentage: 0.8
                            },
                            {
                                label: 'Objetivo Quincena',
                                data: objetivos,
                                backgroundColor: 'rgba(255, 255, 255, 0.1)',
                                borderColor: '#ff5252',
                                borderWidth: 2,
                                order: 2,
                                barPercentage: 0.9,
                                categoryPercentage: 0.8
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top', labels: { color: '#fff', font: { size: 16 } } }
                        },
                        scales: {
                            x: { 
                                stacked: true,
                                ticks: { color: '#fff', font: { size: 14, weight: 'bold' } }
                            },
                            y: {
                                beginAtZero: true,
                                grid: { color: '#333' },
                                ticks: { 
                                    color: '#aaa',
                                    font: { size: 12 },
                                    callback: (value) => '$' + value.toLocaleString()
                                }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
